<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YorushikaTI</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background: #f4f7fb;
  color: #1f2937;
}

.container {
  max-width: 640px;
  margin: 40px auto;
  padding: 0 16px;
}

.card {
  background: #fff;
  border-radius: 16px;
  padding: 24px;
  box-shadow: 0 6px 24px rgba(0,0,0,0.06);
}

.title {
  font-size: 22px;
  font-weight: 700;
  color: #1e3a8a;
}

button {
  background: #2563eb;
  color: #fff;
  border: none;
  padding: 10px 16px;
  border-radius: 999px;
  cursor: pointer;
  margin-top: 10px;
}

button:hover {
  background: #1e40af;
}

input, textarea {
  width: 100%;
  border: 1px solid #e5e7eb;
  border-radius: 10px;
  padding: 10px;
  margin-top: 10px;
}

.comment-item {
  background: #f9fafb;
  padding: 10px;
  border-radius: 10px;
  margin-top: 10px;
}
</style>
</head>

<body>
<div class="container">
  <div id="app" class="card"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, orderBy } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAq3fTUZvUscSi0V5I49TFL9SOLB5e1BfI",
  authDomain: "yorushika-comment.firebaseapp.com",
  projectId: "yorushika-comment",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ===== 简化题目 ===== */
const questions = [
  { text: "你是否经常怀念过去？" },
  { text: "你是否喜欢独处？" },
  { text: "你是否对未来感到迷茫？" }
];

let index = 0;

/* ===== 渲染 ===== */
function render() {
  const appEl = document.getElementById("app");

  if (index < questions.length) {
    appEl.innerHTML = `
      <div class="title">${questions[index].text}</div>
      <button onclick="next()">是</button>
      <button onclick="next()">不是</button>
    `;
  } else {
    appEl.innerHTML = `
      <div class="title">《ただ君に晴れ》</div>

      <h3>留言</h3>
      <input id="name" placeholder="名字">
      <textarea id="msg" placeholder="留言"></textarea>
      <button onclick="addComment()">提交</button>

      <div id="comments"></div>
    `;
    loadComments();
  }
}

window.next = function () {
  index++;
  render();
};

/* ===== 评论 ===== */
window.addComment = async function () {
  const name = document.getElementById("name").value.trim();
  const msg = document.getElementById("msg").value.trim();

  if (!name || !msg) return alert("填完整");

  await addDoc(collection(db, "comments"), {
    name,
    msg,
    time: Date.now()
  });

  loadComments();
};

async function loadComments() {
  const box = document.getElementById("comments");
  const q = query(collection(db, "comments"), orderBy("time", "desc"));
  const snap = await getDocs(q);

  box.innerHTML = snap.docs.map(doc => {
    const c = doc.data();
    return `<div class="comment-item">${c.name} - ${c.msg}</div>`;
  }).join("");
}

render();
</script>

</body>
</html>
